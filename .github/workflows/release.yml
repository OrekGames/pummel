name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.96.1"
  MSRV: "1.96.1"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate tag and Cargo.toml version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [ "$version" != "$cargo_version" ]; then
            echo "Tag version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  quality-gates:
    name: quality-gates
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.MSRV }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --verbose --all-features
      - name: Examples
        run: cargo check --examples
      - name: MSRV
        run: cargo +${{ env.MSRV }} check --all-targets --all-features
      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features
      - name: Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: Docker smoke
        run: |
          docker build -f docker/Dockerfile -t pummel-release-smoke .
          docker run --rm pummel-release-smoke --help
      - name: Installer checks
        run: |
          bash -n scripts/install.sh
          bash scripts/tests/installer_harness.sh

  build-linux:
    name: build-linux
    needs: [validate-tag, quality-gates]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.validate-tag.outputs.tag }}"
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/pummel dist/pummel
          tar -C dist -czf "dist/pummel-${tag}-x86_64-unknown-linux-gnu.tar.gz" pummel
          rm -f dist/pummel
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-x86_64
          path: dist/pummel-${{ needs.validate-tag.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  build-macos-intel:
    name: build-macos-intel
    needs: [validate-tag, quality-gates]
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin
      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary
        run: cargo build --locked --release --target x86_64-apple-darwin
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.validate-tag.outputs.tag }}"
          mkdir -p dist
          COPYFILE_DISABLE=1 tar -C target/x86_64-apple-darwin/release -czf "dist/pummel-${tag}-x86_64-apple-darwin.tar.gz" pummel
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-intel
          path: dist/pummel-${{ needs.validate-tag.outputs.tag }}-x86_64-apple-darwin.tar.gz
          if-no-files-found: error

  build-macos-arm:
    name: build-macos-arm
    needs: [validate-tag, quality-gates]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin
      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary
        run: cargo build --locked --release --target aarch64-apple-darwin
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.validate-tag.outputs.tag }}"
          mkdir -p dist
          COPYFILE_DISABLE=1 tar -C target/aarch64-apple-darwin/release -czf "dist/pummel-${tag}-aarch64-apple-darwin.tar.gz" pummel
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-arm
          path: dist/pummel-${{ needs.validate-tag.outputs.tag }}-aarch64-apple-darwin.tar.gz
          if-no-files-found: error

  build-windows:
    name: build-windows
    needs: [validate-tag, quality-gates]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary
        run: cargo build --locked --release --target x86_64-pc-windows-msvc
      - name: Package archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.validate-tag.outputs.tag }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/x86_64-pc-windows-msvc/release/pummel.exe" `
            -DestinationPath "dist/pummel-$tag-x86_64-pc-windows-msvc.zip" -Force
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-x86_64
          path: dist/pummel-${{ needs.validate-tag.outputs.tag }}-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

  publish-crates:
    name: publish-crates
    needs:
      - validate-tag
      - quality-gates
      - build-linux
      - build-macos-intel
      - build-macos-arm
      - build-windows
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Authenticate to crates.io via Trusted Publishing
        id: crates
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@275b31c2bd0ae2dc5fc5b03747ab8c88d6e3b1c6 # v1
      - name: Publish to crates.io (Trusted Publishing)
        if: steps.crates.outcome == 'success'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates.outputs.token }}
        run: cargo publish --locked
      - name: Publish to crates.io (bootstrap token)
        if: steps.crates.outcome != 'success'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          FIRST_CRATE_PUBLISH: ${{ vars.FIRST_CRATE_PUBLISH }}
        run: |
          set -euo pipefail
          if [ "${FIRST_CRATE_PUBLISH:-}" != "true" ]; then
            echo "Trusted Publishing failed and FIRST_CRATE_PUBLISH is not true." >&2
            echo "Configure crates.io Trusted Publishing, or set the release environment" >&2
            echo "variable FIRST_CRATE_PUBLISH=true with CARGO_REGISTRY_TOKEN for bootstrap only." >&2
            exit 1
          fi
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "FIRST_CRATE_PUBLISH=true but CARGO_REGISTRY_TOKEN is unset." >&2
            exit 1
          fi
          cargo publish --locked

  publish-github-release:
    name: publish-github-release
    needs:
      - validate-tag
      - publish-crates
      - build-linux
      - build-macos-intel
      - build-macos-arm
      - build-windows
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Collect artifacts and write checksums
        shell: bash
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "artifacts/linux-x86_64/pummel-${TAG}-x86_64-unknown-linux-gnu.tar.gz" dist/
          cp "artifacts/macos-intel/pummel-${TAG}-x86_64-apple-darwin.tar.gz" dist/
          cp "artifacts/macos-arm/pummel-${TAG}-aarch64-apple-darwin.tar.gz" dist/
          cp "artifacts/windows-x86_64/pummel-${TAG}-x86_64-pc-windows-msvc.zip" dist/

          cd dist
          for file in \
            "pummel-${TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            "pummel-${TAG}-x86_64-apple-darwin.tar.gz" \
            "pummel-${TAG}-aarch64-apple-darwin.tar.gz" \
            "pummel-${TAG}-x86_64-pc-windows-msvc.zip"; do
            test -f "$file" || { echo "Missing release artifact: $file" >&2; exit 1; }
          done

          sha256sum \
            "pummel-${TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            "pummel-${TAG}-x86_64-apple-darwin.tar.gz" \
            "pummel-${TAG}-aarch64-apple-darwin.tar.gz" \
            "pummel-${TAG}-x86_64-pc-windows-msvc.zip" \
            > checksums-sha256.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: Release ${{ needs.validate-tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/pummel-${{ needs.validate-tag.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
            dist/pummel-${{ needs.validate-tag.outputs.tag }}-x86_64-apple-darwin.tar.gz
            dist/pummel-${{ needs.validate-tag.outputs.tag }}-aarch64-apple-darwin.tar.gz
            dist/pummel-${{ needs.validate-tag.outputs.tag }}-x86_64-pc-windows-msvc.zip
            dist/checksums-sha256.txt
          fail_on_unmatched_files: true
