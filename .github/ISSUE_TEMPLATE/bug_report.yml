name: Bug report
description: Report unexpected behavior in Pummel
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For security issues, email contact@orekgames.com instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal steps or config that reproduce the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pummel version
      description: Output of `pummel --version` or the Git commit.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
